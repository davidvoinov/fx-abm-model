name: Bug report
description: Сообщить о баге в модели/метриках/визуализации
title: "[Bug] "
labels: [bug]
body:
  - type: textarea
    id: problem
    attributes:
      label: Описание проблемы
      description: Что именно сломано?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Шаги воспроизведения
      description: Минимальные шаги для воспроизведения
      placeholder: |
        1. Параметры FXSimulator.default(...)
        2. Команда запуска
        3. Где проявляется ошибка
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Ожидаемое поведение
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Фактическое поведение / traceback
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Версия Python
      placeholder: e.g. 3.10

  - type: textarea
    id: extra
    attributes:
      label: Дополнительно
      description: Логи, скриншоты, графики, ссылки на PR
