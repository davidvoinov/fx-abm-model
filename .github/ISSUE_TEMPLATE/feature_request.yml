name: Feature request
description: Предложить новое поведение модели/метрики/визуализации
title: "[Feature] "
labels: [enhancement]
body:
  - type: textarea
    id: goal
    attributes:
      label: Цель
      description: Какую задачу решает фича?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Предлагаемое решение
      description: Что именно стоит изменить?
    validations:
      required: true

  - type: textarea
    id: impact
    attributes:
      label: Влияние на модель/метрики
      description: Какие компоненты будут затронуты?

  - type: textarea
    id: acceptance
    attributes:
      label: Критерии приемки
      description: Как понять, что задача завершена?
